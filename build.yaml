include:
  # Left Split With Bluetooth
  - board: nice_nano
    shield: scylla_left
    snippet: studio-rpc-usb-uart zmk-usb-logging
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_STUDIO=y
    artifact-name: left_split_bluetooth

    # Right Split With Bluetooth
  - board: nice_nano
    shield: scylla_right
    snippet: zmk-usb-logging
    cmake-args: -DCONFIG_ZMK_SPLIT=y
    artifact-name: right_split_bluetooth

    # Reset firmware
  - board: nice_nano
    shield: settings_reset
    artifact-name: keyboard_reset
